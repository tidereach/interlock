name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-name-guard:
    uses: tidereach/hull/.github/workflows/legacy-name-guard.yml@main

  betterleaks:
    uses: tidereach/hull/.github/workflows/betterleaks.yml@main
    secrets: inherit

  pr-title-lint:
    uses: tidereach/hull/.github/workflows/pr-title-lint.yml@main

  signature-verify:
    uses: tidereach/hull/.github/workflows/signature-verify.yml@main

